<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles/app.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pennoa</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <span class="app__mark" aria-hidden="true">✈</span>
        <h1 class="app__title">Pennoa</h1>
        <button id="add-btn" class="app__add" type="button" aria-label="Add meeting">
          +
        </button>
      </header>
      <p class="app__tagline">Meeting reminders that respect your flow.</p>
      <ul class="meeting-list" id="meetings">
        <li class="meeting-list__empty">Loading…</li>
      </ul>
    </main>

    <div id="modal" class="modal" hidden>
      <form class="modal__sheet" id="form" autocomplete="off">
        <h2 class="modal__title" id="modal-title">New meeting</h2>
        <label class="field">
          <span class="field__label">Title</span>
          <input
            class="field__input"
            name="title"
            type="text"
            required
            maxlength="120"
            placeholder="standup with the team"
          />
        </label>
        <div class="field-row">
          <label class="field">
            <span class="field__label">Date</span>
            <input class="field__input" name="date" type="date" required />
          </label>
          <label class="field">
            <span class="field__label">Time</span>
            <input class="field__input" name="time" type="time" required />
          </label>
        </div>
        <label class="field">
          <span class="field__label">Repeat</span>
          <select class="field__input" name="repeat">
            <option value="none">None</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
          </select>
        </label>
        <div class="modal__actions">
          <button type="button" id="cancel-btn" class="btn btn--ghost">Cancel</button>
          <button type="button" id="delete-btn" class="btn btn--danger" hidden>
            Delete
          </button>
          <button type="submit" class="btn btn--primary">Save</button>
        </div>
      </form>
    </div>
  </body>
</html>
