<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles/app.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pennoa</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <span class="app__mark" aria-hidden="true">✈</span>
        <h1 class="app__title">Pennoa</h1>
        <button id="add-btn" class="app__add" type="button" aria-label="Add meeting">
          +
        </button>
      </header>
      <p class="app__tagline">Meeting reminders that respect your flow.</p>
      <ul class="meeting-list" id="meetings">
        <li class="meeting-list__empty">Loading…</li>
      </ul>

      <section class="settings">
        <label class="settings__row">
          <input id="autostart-toggle" type="checkbox" />
          <span class="settings__label">Launch Pennoa at login</span>
        </label>

        <div class="settings__row settings__row--stacked">
          <span class="settings__label">Banner speed</span>
          <div class="speed-picker" id="speed-picker">
            <button type="button" class="speed-picker__option" data-speed="slow">
              Slow
            </button>
            <button type="button" class="speed-picker__option" data-speed="normal">
              Normal
            </button>
            <button type="button" class="speed-picker__option" data-speed="fast">
              Fast
            </button>
          </div>
        </div>

        <div class="settings__row settings__row--stacked">
          <span class="settings__label">Banner style</span>
          <div class="variant-picker" id="variant-picker">
            <button
              type="button"
              class="variant-picker__option"
              data-variant="pennant"
            >
              <span class="variant-sample variant-sample--pennant">
                <span class="variant-sample__title">standup</span>
              </span>
              <span class="variant-picker__label">Pennant</span>
            </button>
            <button
              type="button"
              class="variant-picker__option"
              data-variant="ribbon"
            >
              <span class="variant-sample variant-sample--ribbon">
                <span class="variant-sample__title">standup</span>
              </span>
              <span class="variant-picker__label">Ribbon</span>
            </button>
            <button
              type="button"
              class="variant-picker__option"
              data-variant="poster"
            >
              <span class="variant-sample variant-sample--poster">
                <span class="variant-sample__title">STANDUP</span>
              </span>
              <span class="variant-picker__label">Poster</span>
            </button>
            <button
              type="button"
              class="variant-picker__option"
              data-variant="marquee"
            >
              <span class="variant-sample variant-sample--marquee">
                <span class="variant-sample__title">STANDUP</span>
              </span>
              <span class="variant-picker__label">Marquee</span>
            </button>
            <button
              type="button"
              class="variant-picker__option"
              data-variant="postcard"
            >
              <span class="variant-sample variant-sample--postcard">
                <span class="variant-sample__title">standup</span>
              </span>
              <span class="variant-picker__label">Postcard</span>
            </button>
            <button
              type="button"
              class="variant-picker__option"
              data-variant="neon"
            >
              <span class="variant-sample variant-sample--neon">
                <span class="variant-sample__title">standup</span>
              </span>
              <span class="variant-picker__label">Neon</span>
            </button>
            <button
              type="button"
              class="variant-picker__option"
              data-variant="holo"
            >
              <span class="variant-sample variant-sample--holo">
                <span class="variant-sample__title">standup</span>
              </span>
              <span class="variant-picker__label">Holo</span>
            </button>
            <button
              type="button"
              class="variant-picker__option"
              data-variant="synthwave"
            >
              <span class="variant-sample variant-sample--synthwave">
                <span class="variant-sample__title">STANDUP</span>
              </span>
              <span class="variant-picker__label">Synthwave</span>
            </button>
            <button
              type="button"
              class="variant-picker__option"
              data-variant="aurora"
            >
              <span class="variant-sample variant-sample--aurora">
                <span class="variant-sample__title">standup</span>
              </span>
              <span class="variant-picker__label">Aurora</span>
            </button>
            <button
              type="button"
              class="variant-picker__option"
              data-variant="cyber"
            >
              <span class="variant-sample variant-sample--cyber">
                <span class="variant-sample__title">standup</span>
              </span>
              <span class="variant-picker__label">Cyber</span>
            </button>
            <button
              type="button"
              class="variant-picker__option"
              data-variant="advert"
            >
              <span class="variant-sample variant-sample--advert">
                <span class="variant-sample__title">STANDUP</span>
              </span>
              <span class="variant-picker__label">Advert</span>
            </button>
          </div>
        </div>

        <div class="settings__row settings__row--stacked">
          <span class="settings__label">Plane icon</span>
          <div class="plane-picker">
            <div class="plane-presets" id="plane-presets"></div>
            <div class="plane-picker__preview" id="plane-preview"></div>
            <div class="plane-picker__actions">
              <label class="btn btn--ghost">
                Upload image…
                <input
                  id="plane-upload-input"
                  type="file"
                  accept=".svg,.png,.jpg,.jpeg,.webp,image/svg+xml,image/png,image/jpeg,image/webp"
                  hidden
                />
              </label>
              <button
                type="button"
                id="plane-reset-btn"
                class="btn btn--ghost"
                hidden
              >
                Reset
              </button>
            </div>
            <p class="plane-picker__hint" id="plane-hint">
              Pick a preset above or upload your own SVG / PNG.
            </p>
          </div>
        </div>
      </section>
    </main>

    <div id="modal" class="modal" hidden>
      <form class="modal__sheet" id="form" autocomplete="off">
        <h2 class="modal__title" id="modal-title">New meeting</h2>
        <label class="field">
          <span class="field__label">Title</span>
          <input
            class="field__input"
            name="title"
            type="text"
            required
            maxlength="120"
            placeholder="standup with the team"
          />
        </label>
        <div class="field-row">
          <label class="field">
            <span class="field__label">Date</span>
            <input class="field__input" name="date" type="date" required />
          </label>
          <label class="field">
            <span class="field__label">Time</span>
            <input class="field__input" name="time" type="time" required />
          </label>
        </div>
        <label class="field">
          <span class="field__label">Repeat</span>
          <select class="field__input" name="repeat">
            <option value="none">None</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
          </select>
        </label>
        <div class="modal__actions">
          <button type="button" id="cancel-btn" class="btn btn--ghost">Cancel</button>
          <button type="button" id="delete-btn" class="btn btn--danger" hidden>
            Delete
          </button>
          <button type="submit" class="btn btn--primary">Save</button>
        </div>
      </form>
    </div>
  </body>
</html>
