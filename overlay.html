<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/overlay.css" />
    <title>Pennoa Banner</title>
    <script type="module" src="/src/overlay.ts" defer></script>
  </head>
  <body class="overlay" data-stage="t10">
    <div class="overlay__wind" aria-hidden="true">
      <span class="overlay__wind-line" style="--y: 6%; --dur: 1.4s; --w: 90px; --delay: 0s; --o: 0.45"></span>
      <span class="overlay__wind-line" style="--y: 14%; --dur: 1.8s; --w: 60px; --delay: 0.5s; --o: 0.35"></span>
      <span class="overlay__wind-line" style="--y: 21%; --dur: 1.1s; --w: 120px; --delay: 0.2s; --o: 0.55"></span>
      <span class="overlay__wind-line" style="--y: 28%; --dur: 1.6s; --w: 75px; --delay: 0.9s; --o: 0.4"></span>
      <span class="overlay__wind-line" style="--y: 35%; --dur: 1.3s; --w: 100px; --delay: 0.3s; --o: 0.5"></span>
      <span class="overlay__wind-line" style="--y: 43%; --dur: 1.9s; --w: 55px; --delay: 0.7s; --o: 0.3"></span>
      <span class="overlay__wind-line" style="--y: 52%; --dur: 1.5s; --w: 95px; --delay: 0.4s; --o: 0.45"></span>
      <span class="overlay__wind-line" style="--y: 60%; --dur: 1.2s; --w: 80px; --delay: 0.1s; --o: 0.4"></span>
      <span class="overlay__wind-line" style="--y: 68%; --dur: 1.7s; --w: 110px; --delay: 0.8s; --o: 0.5"></span>
      <span class="overlay__wind-line" style="--y: 76%; --dur: 1.4s; --w: 70px; --delay: 0.6s; --o: 0.35"></span>

      <span class="overlay__wind-dot" style="--y: 11%; --dur: 1.6s; --delay: 0.2s"></span>
      <span class="overlay__wind-dot" style="--y: 30%; --dur: 1.3s; --delay: 0.6s"></span>
      <span class="overlay__wind-dot" style="--y: 47%; --dur: 1.8s; --delay: 0.4s"></span>
      <span class="overlay__wind-dot" style="--y: 64%; --dur: 1.5s; --delay: 0.9s"></span>
      <span class="overlay__wind-dot" style="--y: 80%; --dur: 1.4s; --delay: 0.3s"></span>
    </div>

    <div class="overlay__stage" id="stage">
      <div class="overlay__pennant">
        <span class="overlay__fold" aria-hidden="true"></span>
        <span class="overlay__sheen" aria-hidden="true"></span>
        <span class="overlay__title" id="title">—</span>
        <span class="overlay__tassel" aria-hidden="true"></span>
      </div>
      <svg
        class="overlay__rope"
        viewBox="0 0 56 32"
        preserveAspectRatio="none"
        aria-hidden="true"
      >
        <path
          d="M 0 6 L 18 16 L 0 26 M 18 16 L 56 16"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.85"
        />
      </svg>
      <div class="overlay__plane" id="plane" aria-hidden="true"></div>
    </div>
  </body>
</html>
